base_config: default.yaml

data:
  required_articulators:
    - upper-lip
    - lower-lip
    - tongue
    - soft-palate-midline
    - pharynx
    - epiglottis
    - arytenoid-cartilage
    - vocal-folds
  normalization:
    max_sampled_frames: 128

audio:
  device: cuda

model:
  dim: 16
  dim_mults: [1, 2, 4]
  num_sample_steps: 4
  memory_efficient: true
  attn_heads: 4
  attn_dim_head: 32
  ff_mult: 1.0

train:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  use_amp: false
  max_train_steps: 2000
  valid_every: 250
  sample_every: 1000
  checkpoint_every: 500

demo:
  max_demo_samples: 5

eval:
  max_eval_samples: 200
  sample_selection: evenly_spaced

runtime:
  output_dir: outputs/speech2rtmri_artspeech_full_database_grouille_a100_10h
  reuse_existing_manifests: true
